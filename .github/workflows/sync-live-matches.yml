name: Sync live matches

on:
  workflow_dispatch:
  schedule:
    - cron: "2-59/5 * * * *"

jobs:
  sync-live-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase streamlit

      - name: Sync live matches
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
          FOOTBALL_DATA_COMPETITION_CODE: ${{ secrets.FOOTBALL_DATA_COMPETITION_CODE }}
        run: python scripts/sync_live_matches.py
