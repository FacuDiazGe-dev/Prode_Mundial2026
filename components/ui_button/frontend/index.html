<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light;
      font-family: Montserrat, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: transparent;
      color: #07111f;
    }

    .button-shell {
      width: 100%;
      padding: 1px 0 5px;
    }

    .ui-button {
      min-height: 46px;
      width: auto;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border-radius: 15px;
      border: 1px solid rgba(180, 130, 20, 0.35);
      cursor: pointer;
      color: #07111f;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.30), transparent 42%),
        linear-gradient(180deg, rgba(244, 197, 66, 0.98), rgba(255, 220, 105, 0.94));
      box-shadow:
        0 10px 22px rgba(244, 197, 66, 0.20),
        0 0 16px rgba(244, 197, 66, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.44);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }

    .ui-button.full-width {
      width: 100%;
    }

    .ui-button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(244, 197, 66, 0.60);
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.40), transparent 42%),
        linear-gradient(180deg, rgba(255, 220, 105, 1), rgba(244, 197, 66, 0.96));
      box-shadow:
        0 13px 26px rgba(244, 197, 66, 0.26),
        0 0 18px rgba(244, 197, 66, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }

    .ui-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .ui-button:disabled,
    .ui-button.locked {
      cursor: not-allowed;
      color: rgba(248, 250, 252, 0.70);
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(7, 17, 31, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 8px 18px rgba(15, 23, 42, 0.10);
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      min-width: 18px;
      font-size: 16px;
      line-height: 1;
    }

    .label {
      min-width: 0;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div id="root" class="button-shell"></div>

  <script>
    const root = document.getElementById("root");
    let currentAction = null;

    function sendMessage(type, data) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...data,
        },
        "*"
      );
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", {
        height: Math.min(document.body.scrollHeight, 64),
      });
    }

    function setValue(value) {
      sendMessage("streamlit:setComponentValue", {
        value: {
          action: value,
          event_id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        },
        dataType: "json",
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(args) {
      const label = escapeHtml(args.label || "Accion");
      const icon = escapeHtml(args.icon || "");
      const variant = escapeHtml(args.variant || "primary");
      const fullWidth = args.full_width !== false;
      const disabled = Boolean(args.disabled);
      currentAction = args.action ?? label;

      root.innerHTML = `
        <button
          class="ui-button ${variant} ${fullWidth ? "full-width" : ""}"
          type="button"
          ${disabled ? "disabled" : ""}
        >
          ${icon ? `<span class="icon">${icon}</span>` : ""}
          <span class="label">${label}</span>
        </button>
      `;

      const button = root.querySelector(".ui-button");
      button.addEventListener("click", () => {
        if (disabled) {
          return;
        }

        setValue(currentAction);
      });

      setFrameHeight();
    }

    window.addEventListener("message", (event) => {
      if (event.data?.type !== "streamlit:render") {
        return;
      }

      render(event.data.args || {});
    });

    sendMessage("streamlit:componentReady", { apiVersion: 1 });
    setFrameHeight();
  </script>
</body>
</html>
